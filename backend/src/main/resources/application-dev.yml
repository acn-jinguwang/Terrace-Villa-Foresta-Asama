spring:
  datasource:
    url: jdbc:h2:mem:forestadb;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect

# Dev: use local storage
media:
  storage-mode: local
  local-path: ${user.dir}/../data/local-media

logging:
  level:
    jp.forestaasama: DEBUG
