plans:
  - id: golf
    image: plans/golf.jpg
    duration: 7
    price: "¥60,000"
    currency: JPY
    tag:
      zh: 最受欢迎
      ja: 最人気
      en: Most Popular
    title:
      zh: 高尔夫精英之旅
      ja: ゴルフエリートの旅
      en: Golf Elite Journey
    tagline:
      zh: 征服日本顶级球场，体验皇室级奢华
      ja: 日本最高峰コースを制覇し、ロイヤルクラスの贅沢を体験
      en: Conquer Japan's finest courses, experience royal-class luxury
    description:
      zh: 此行不仅是一场对顶级绿茵的征服，更是一次深入日本皇室避暑地核心的灵魂洗礼。
      ja: この旅は単なるトップクラスのグリーンへの挑戦ではなく、日本の皇室避暑地の中核に深く入り込む魂の洗礼でもあります。
      en: This journey is not just a conquest of top-tier greens, but a spiritual immersion into the heart of Japan's royal summer retreat.
    includes:
      - zh: 6晚 Terrace Villa Foresta Asama 独立别墅住宿
        ja: 6泊 Terrace Villa Foresta Asama 独立ヴィラ宿泊
        en: 6 nights at Terrace Villa Foresta Asama private villa
      - zh: 5场顶级高尔夫球场绿地费
        ja: 5ラウンドのトップゴルフコース利用
        en: 5 rounds at top golf courses
      - zh: 全程专属私人管家服务
        ja: 全行程専属プライベートバトラーサービス
        en: Dedicated private butler throughout
      - zh: 每日别墅早餐及指定餐厅晚宴
        ja: 毎日ヴィラ朝食と指定レストランディナー
        en: Daily villa breakfast and designated dinners
      - zh: 全程私人豪华专车
        ja: 全行程プライベート高級車
        en: Private luxury transportation throughout
    highlights:
      - zh: 5大顶级球场体验
        ja: 5大トップコース体験
        en: 5 Top Golf Courses
      - zh: 别墅私人管家
        ja: ヴィラ専属バトラー
        en: Private Villa Butler
      - zh: 米其林餐厅晚宴
