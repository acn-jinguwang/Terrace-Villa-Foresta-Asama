        ja: 白糸の滝ハイキング
        en: Shiraito Falls Hike
      - zh: 浅间山观望
        ja: 浅間山ビュー
        en: Mt. Asama View
      - zh: 星野温泉体验
        ja: 星野温泉体験
        en: Hoshino Onsen

