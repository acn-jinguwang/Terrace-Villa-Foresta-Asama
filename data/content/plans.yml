      - day: 1
        title:
          zh: 抵达轻井泽：初遇浅间之美
          ja: 軽井沢到着：浅間山との初めての出会い
          en: Arrival in Karuizawa - First Encounter with Mt. Asama
        activities:
          - zh: 抵达轻井泽车站
            ja: 軽井沢駅到着
            en: Arrive at Karuizawa Station
          - zh: 私人专车接送至别墅办理入住
            ja: プライベート車でヴィラにチェックイン
            en: Private transfer to villa check-in
          - zh: 轻井泽浅间高尔夫球场午后开球
            ja: 軽井沢浅間ゴルフ場午後プレー
            en: Afternoon round at Karuizawa Asama Golf Course
        meals:
          morning:
            zh: 不含
            ja: 不含
            en: Not included
          lunch:
            zh: 球场精致轻食
            ja: コース上品なライトミール
            en: Course refined light meal
          dinner:
            zh: 别墅内私人主厨和牛晚宴
            ja: ヴィラ内プライベートシェフ和牛ディナー
            en: Private chef wagyu dinner in villa
    budget:
      - category:
          zh: 奢华下榻
          ja: 贅沢宿泊
          en: Luxury Accommodation
        amount: "¥25,000"
        note:
          zh: Terrace Villa Foresta Asama 6晚独立别墅住宿（双人分享），含私人管家服务
          ja: Terrace Villa Foresta Asama 6泊独立ヴィラ（2名様）、専属バトラー込み
          en: 6 nights private villa (shared double), including butler service
      - category:
          zh: 顶级果岭费
          ja: トップグリーンフィー
          en: Top Green Fees
        amount: "¥15,000"
        note:
          zh: 包含5场顶级球场的果岭费、球车费
          ja: 5ラウンド分のグリーンフィー、カートフィー含む
          en: Includes 5 rounds of green fees, cart fees
      - category:
          zh: 饕餮餐饮
          ja: グルメ飲食
          en: Gourmet Dining
        amount: "¥12,000"
        note:
          zh: 每日别墅内高端早餐、球场精致午餐及晚宴
          ja: 毎日のヴィラ高級朝食、コース上品ランチ、晩餐
          en: Daily villa premium breakfast, course lunch, and exclusive dinners
      - category:
          zh: 专车与服务
          ja: 専用車とサービス
          en: Private Transfer & Services
        amount: "¥8,000"
        note:
          zh: 全行程私人专车、专业领队服务及所有景点门票
          ja: 全行程プライベート送迎、ガイドサービス、観光地入場料含む
          en: Full itinerary private transfer, professional guide, all entrance fees

  - id: nature
    image: plans/nature.jpg
    duration: 4
    price: "¥35,000"
    tag: null
    title:
      zh: 轻井泽自然探索
      ja: 軽井沢ネイチャーツアー
