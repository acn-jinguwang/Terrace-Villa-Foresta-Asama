      zh: 深入轻井泽原始森林，感受大自然的恢弘与宁静，开启心灵的归宿之旅。
      ja: 軽井沢の原生林に分け入り、大自然の壮大さと静寂を感じる心の故郷への旅。
      en: Venture deep into Karuizawa's primeval forest, feel the grandeur and tranquility of nature.
    includes:
      - zh: 3晚独立别墅住宿
